name: Daily refresh + deploy

on:
  schedule:
    - cron: '17 6 * * *'  # daily at 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'public/jobs.json'  # the auto-commit below pushes this file;
                            # ignoring it prevents the workflow from
                            # self-triggering in a loop.

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm ci || npm install

      - name: Scrape jobs
        run: npm run scrape
        continue-on-error: true

      - name: WhatsApp digest (top 5)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npm run notify
        continue-on-error: true
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
          WHATSAPP_TEMPLATE: ${{ secrets.WHATSAPP_TEMPLATE }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Commit refreshed jobs.json
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/jobs.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh jobs.json [skip ci]"
            git push
          else
            echo "No changes in jobs.json"
          fi

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build site
        run: npm run build
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
